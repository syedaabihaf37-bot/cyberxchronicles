<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - CyberXChronicles</title>

<link rel="icon" href="https://img.icons8.com/fluency/48/cyber-security.png">

<style>
:root{
  --bg:#0B0F19;
  --primary:#00D1FF;
  --text:#AAB4C5;
  --card:#111625;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  display:flex;
  gap:10px;
  align-items:center;
  font-weight:bold;
  color:white;
}

.logo-box{
  width:26px;
  height:26px;
  background:linear-gradient(45deg,#00D1FF,#007BFF);
  border-radius:6px;
}

nav a{
  margin-left:15px;
  color:var(--text);
  text-decoration:none;
}

nav a:hover{
  color:var(--primary);
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px 30px;
}

.hero h1{
  color:white;
  font-size:38px;
}

.hero span{
  color:var(--primary);
}

/* CARD */
.card{
  max-width:650px;
  margin:40px auto;
  background:var(--card);
  padding:25px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  outline:none;
  border-radius:6px;
  background:#0d1220;
  color:white;
  font-size:14px;
}

/* BUTTON GROUP */
.btn-group{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:15px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#00D1FF,#007BFF);
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
  color:#000;
}

.btn:hover{
  opacity:0.9;
}

/* LINKEDIN */
.btn-linkedin{
  background:#0077b5;
  color:white;
  text-decoration:none;
  text-align:center;
}

/* INFO */
.info{
  max-width:650px;
  margin:20px auto;
  background:rgba(0,209,255,0.08);
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(0,209,255,0.2);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:var(--text);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-box"></div>
    CyberXChronicles
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Contact & <span>Support</span></h1>
  <p>Send us your query and we’ll respond within 24–48 hours.</p>
</section>

<!-- FORM -->
<div class="card">

  <input type="text" id="name" placeholder="Your Name*" required>
  <input type="email" id="email" placeholder="Your Email*" required>
  <input type="text" id="service" placeholder="Service Needed*" required>
  <textarea id="message" rows="6" placeholder="Describe your issue..." required></textarea>

  <div class="btn-group">
    <button class="btn" onclick="sendEmail()">Send Message</button>

    <a class="btn btn-linkedin" href="https://www.linkedin.com/company/cyberxchronicles/" target="_blank">
      Contact on LinkedIn
    </a>
  </div>

</div>

<!-- INFO -->
<div class="info">
  ✔ We receive your request instantly<br>
  ✔ Our team reviews it<br>
  ✔ You get a professional response via email
</div>

<footer>
  © 2026 CyberXChronicles. All rights reserved.
</footer>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5bcJ_kJonKAKDQ7u1");
})();

function sendEmail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const service = document.getElementById("service").value;
  const message = document.getElementById("message").value;

  if(!name || !email || !service || !message){
    alert("Please fill all fields");
    return;
  }

  const templateParams = {
    name: name,
    email: email,
    service: service,
    message: message
  };

  emailjs.send("service_psjiacw","template_xcubr49",templateParams)
  .then(function(){
    alert("Message sent successfully!");

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("service").value = "";
    document.getElementById("message").value = "";
  })
  .catch(function(error){
    console.log(error);
    alert("Failed to send message.");
  });
}
</script>

</body>
</html>
