<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - CyberXChronicles</title>

<link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/cyber-security.png">
<link rel="shortcut icon" href="https://img.icons8.com/fluency/48/cyber-security.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND */
#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* HEADER */
header{
  background:#070a12;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

header h1{
  margin:0;
  font-size:18px;
}

/* NAV */
nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-size:14px;
  opacity:0.8;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#00D1FF;
}

/* WRAPPER */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90vh;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:600px;
  background:linear-gradient(135deg,#b31237,#6a0000);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{margin-bottom:10px;}
p{opacity:0.9;margin-bottom:20px;}

/* INPUTS */
input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:white;
  color:black;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:20px;
  padding:15px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#b31237;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
}

/* LINKEDIN */
.btn-linkedin{
  background:#0077b5;
  color:white;
  margin-top:10px;
}

.small{
  margin-top:20px;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- ⚡ ANIMATED BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<header>
  <h1>CyberXChronicles</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="wrapper">
  <div class="card">

    <h2>Contact & Support</h2>

    <p>
      Fill in your details below and our cybersecurity team will respond within 24–48 hours.
    </p>

    <input type="text" id="name" placeholder="Name*" required>
    <input type="email" id="email" placeholder="Email*" required>
    <input type="text" id="service" placeholder="Service*" required>
    <textarea id="message" rows="6" placeholder="Your Message*" required></textarea>

    <button class="btn" onclick="sendEmail()">📧 Send Email</button>

    <a class="btn btn-linkedin" href="https://www.linkedin.com/company/cyberxchronicles/" target="_blank">
      💼 Contact on LinkedIn
    </a>

    <div class="small">
      Response time: 24–48 hours
    </div>

  </div>
</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5bcJ_kJonKAKDQ7u1");
})();

function sendEmail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const service = document.getElementById("service").value;
  const message = document.getElementById("message").value;

  if(!name || !email || !service || !message){
    alert("⚠️ Please fill all fields!");
    return;
  }

  const templateParams = { name, email, service, message };

  emailjs.send("service_psjiacw","template_xcubr49",templateParams)
  .then(function(){
    alert("✅ Message sent successfully!");

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("service").value = "";
    document.getElementById("message").value = "";
  })
  .catch(function(error){
    console.log(error);
    alert("❌ Failed to send message.");
  });

}
</script>

<!-- ⚡ ANIMATION SCRIPT -->
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speedX: (Math.random()-0.5),
    speedY: (Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00D1FF";

  particles.forEach(p=>{
    p.x += p.speedX;
    p.y += p.speedY;

    if(p.x<0 || p.x>canvas.width) p.speedX *= -1;
    if(p.y<0 || p.y>canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
