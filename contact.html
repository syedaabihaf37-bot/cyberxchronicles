<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - CyberXChronicles</title>

<!-- FAVICON (SAME AS HOMEPAGE) -->
<link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/cyber-security.png">
<link rel="shortcut icon" href="https://img.icons8.com/fluency/48/cyber-security.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* HEADER */
header{
  background:#070a12;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

header h1{
  margin:0;
  font-size:18px;
}

/* NAV */
nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-size:14px;
  opacity:0.8;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:#00D1FF;
}

/* WRAPPER */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90vh;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:600px;
  background:linear-gradient(135deg,#b31237,#6a0000);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{margin-bottom:10px;}
p{opacity:0.9;margin-bottom:20px;line-height:1.5;}

/* INPUTS */
input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  outline:none;
  font-family:Arial;
  background:#ffffff;
  color:#000;
}

/* BUTTON */
.btn{
  display:block;
  width:100%;
  margin:15px 0;
  padding:15px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#b31237;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
}

/* LINKEDIN */
.btn-linkedin{
  background:#0077b5;
  color:white;
}

.small{
  margin-top:15px;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
  <h1>CyberXChronicles</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="wrapper">
  <div class="card">

    <h2>Contact & Support</h2>

    <p>
      Fill in your details below and our cybersecurity team will respond within 24–48 hours.
    </p>

    <!-- FORM -->
    <input type="text" id="name" placeholder="Name*" required>
    <input type="email" id="email" placeholder="Email*" required>
    <input type="text" id="service" placeholder="Service*" required>
    <textarea id="message" rows="6" placeholder="Your Message*" required></textarea>

    <!-- SEND BUTTON -->
    <button class="btn" onclick="sendEmail()">
      📧 Send Email
    </button>

    <!-- LINKEDIN -->
    <a class="btn btn-linkedin" href="https://www.linkedin.com/company/cyberxchronicles/" target="_blank">
      💼 Contact on LinkedIn
    </a>

    <div class="small">
      Response time: 24–48 hours
    </div>

  </div>
</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5bcJ_kJonKAKDQ7u1");
})();

function sendEmail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const service = document.getElementById("service").value;
  const message = document.getElementById("message").value;

  if(!name || !email || !service || !message){
    alert("⚠️ Please fill all fields!");
    return;
  }

  const templateParams = {
    name: name,
    email: email,
    service: service,
    message: message
  };

  emailjs.send("service_psjiacw","template_xcubr49",templateParams)
  .then(function(){
    alert("✅ Message sent successfully!");

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("service").value = "";
    document.getElementById("message").value = "";
  })
  .catch(function(error){
    console.log(error);
    alert("❌ Failed to send message.");
  });

}
</script>

</body>
</html>
