<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultation - CyberXChronicles</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* HEADER */
header{
  background:#070a12;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

header h1{
  font-size:18px;
  margin:0;
  color:#fff;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-size:14px;
  opacity:0.8;
}

nav a:hover{
  opacity:1;
  color:#b31237;
}

/* WRAPPER */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:700px;
  background:linear-gradient(135deg,#b31237,#6a0000);
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{margin-bottom:10px;}
p{opacity:0.9;}

.row{
  display:flex;
  gap:15px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:white;
  color:#b31237;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:600px){
  .row{flex-direction:column;}
  header{
    flex-direction:column;
    align-items:flex-start;
  }
  nav a{
    margin-left:0;
    margin-right:10px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>CyberXChronicles</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
  </nav>
</header>

<div class="wrapper">
  <div class="card">

    <h2>Request a consultation</h2>
    <p>We will respond to your cybersecurity request.</p>

    <form id="consultForm">

      <div class="row">
        <input type="text" id="first" placeholder="First Name*" required>
        <input type="text" id="last" placeholder="Last Name*" required>
      </div>

      <input type="email" id="email" placeholder="Business Email*" required>
      <input type="text" id="service" placeholder="Service Needed*" required>

      <textarea id="message" rows="6" placeholder="Security needs, details..." required></textarea>

      <button type="submit">Send Request</button>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("5bcJ_kJonKAKDQ7u1"); 
})();

document.getElementById("consultForm").addEventListener("submit", function(e){
  e.preventDefault();

  emailjs.send("service_psjiacw","template_xcubr49",{
    first_name: document.getElementById("first").value,
    last_name: document.getElementById("last").value,
    email: document.getElementById("email").value,
    service: document.getElementById("service").value,
    message: document.getElementById("message").value
  })
  .then(function(response){
    alert("✅ Request sent successfully!");
  }, function(error){
    alert("❌ Failed to send. Try again.");
  });
});
</script>

</body>
</html>
