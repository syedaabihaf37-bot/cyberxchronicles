<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultation - CyberXChronicles</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* CENTER WRAPPER */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:700px;
  background:linear-gradient(135deg,#b31237,#6a0000);
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
h2{
  margin-bottom:10px;
}

p{
  opacity:0.9;
  margin-bottom:25px;
}

/* GRID */
.row{
  display:flex;
  gap:15px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:white;
  color:#b31237;
  font-weight:bold;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:600px){
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card">

    <h2>Request a consultation</h2>
    <p>We just need a few details to understand your cybersecurity needs.</p>

    <form action="https://formsubmit.co/cyberxchronicles@gmail.com" method="POST">

      <div class="row">
        <input type="text" name="first_name" placeholder="First Name*" required>
        <input type="text" name="last_name" placeholder="Last Name*" required>
      </div>

      <input type="email" name="email" placeholder="Business Email*" required>

      <input type="text" name="service" placeholder="Service needed (Pentest, IR, VA...)" required>

      <textarea rows="6" name="message" placeholder="Security needs, scoping details, etc*" required></textarea>

      <button type="submit">Send Request</button>

    </form>

  </div>

</div>

</body>
</html>
